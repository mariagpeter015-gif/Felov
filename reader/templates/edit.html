<!DOCTYPE html>
<html>
<head>
    <title>FELOV: Edit Book</title>
    <style>
        body {
            font-family: Ink Free;
            background-color: #722f37;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .logincon{
        background-color: rgba(255, 255, 255, 0.1);
        padding: 10px;
        border-radius: 7px;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        width: 350px;
        height: 380px;
        align-items:center;
        }

        .entry-box, textarea {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }
        .submit-btn {
            width: 100%;
            padding: 10px;
            background: white;
            color: #722f37;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: grab;
        }
        .delete-button {
            background: transparent;
            border: 2px solid #ff4d4d;
            color: #ff5d5d;
            padding: 10px;
            width: 340px;
            font-weight: bold;
            border-radius: 5px;
            cursor: grab;
            font-family: Viner Hand ITC;
        }
        .delete-button:hover {
            background-color: #ff4d4d;
            color: white;
        }
    </style>
</head>
<body>
<!-- Edit Book Form -->
<form method="POST">
    {% csrf_token %}
    <h1 style="font-family: Viner Hand ITC;margin-bottom: 5px;">FELOV</h1>
    <div class="logincon">
    <h3>EDIT &#127807;</h3>
    <input type="text" name="title" value="{{ book.title }}" class="entry-box" required>
    <input type="text" name="author" value="{{ book.author }}" class="entry-box" required>
    <textarea name="description" rows="5" required>{{ book.description }}</textarea>
    <label>
        <input type="checkbox" name="is_finished" {% if book.is_finished %}checked{% endif %}> Finished
    </label><br><br>
    <button type="submit" class="submit-btn" style="font-family: Ink Free;">update!</button>
        </div>
</form><br>

<!-- Delete Button -->
<form method="POST" action="{% url 'delete_book' book.id %}">
    {% csrf_token %}
    <button type="submit" class="delete-button" onclick="return confirm('Are you sure you want to delete this book?');">Delete Book</button>
</form>
</body>
</html>
