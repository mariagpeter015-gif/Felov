<!DOCTYPE html>
<html>
<head>
    <title>FELOV: Add Book</title>
    <style>
        body{
        font-family: Ink Free;
        background-color: #722f37;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 99vh;
        }

        .logincon{
        background-color: rgba(255, 255, 255, 0.1);
        padding: 10px;
        border-radius: 7px;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        width: 350px;
        align-items:center;
        }
        .entry-box {
            width: 79%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
        }

        textarea {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background: white;
            color: #722f37;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
            font-family: Ink free;
        }
    </style>
</head>
<body>
<form method="POST" action="{% url 'add_book' %}">
    {% csrf_token %}
  <h1 style="font-family: Viner Hand ITC;margin-bottom: 5px;">FELOV</h1>
  <div class="logincon">
    <h2>Add new book? &#127807;</h2>
    <label for="title">Book</label>
    <input type="text" id="title" name="title" placeholder="enter book" style="font-family: Ink Free; margin-left: 15.56px" class="entry-box" required>
    <label for="author">Author</label>
    <input type="text" id="author" name="author" placeholder="enter author" style="font-family: Ink Free;" class="entry-box" required>
    <textarea name="description" id="description" placeholder="about the book?" style="font-family: Ink Free;" rows="5" required></textarea>
    <button type="submit" class="submit-btn">add!</button>
    </div>
</form>
</body>
</html>
